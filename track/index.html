<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта уровней</title>
    <style>
        [x-cloak] { display: none !important; }
        html, body {
            overflow-x: hidden;
            position: relative;
            width: 100%;
        }
        @keyframes pulse { 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-800 pb-24">

    <div x-data="trackApp()" class="max-w-2xl mx-auto px-4 pt-8" x-cloak>
    
        <!-- Заголовок: либо данные, либо скелетон -->
        <div class="mb-12">
            <template x-if="currentLevel">
                <div class="bg-[#c084fc] rounded-3xl p-6 shadow-lg text-white">
                    <p class="uppercase text-xs font-bold opacity-80 tracking-widest mb-1" x-text="courseTitle"></p>
                    <h1 class="text-2xl font-bold" x-text="currentLevel.title"></h1>
                </div>
            </template>
            <template x-if="!currentLevel">
                <div class="h-[116px] bg-gray-200 rounded-3xl animate-pulse"></div>
            </template>
        </div>

        <div class="relative flex flex-col items-center space-y-8 py-4">
            <!-- visibleLevels теперь сразу содержит 30 элементов-пустышек по умолчанию -->
            <template x-for="(level, index) in visibleLevels" :key="index">
                <div class="relative flex flex-col items-center w-full" :style="`margin-left: ${getOffset(index)}%`">
                    <div class="relative transition-all duration-300" 
                        style="width: 114px; height: 104px;">
                        
                        <!-- Фон кнопки (всегда виден) -->
                        <div class="absolute inset-x-0 bottom-0 rounded-full"
                            style="height: 93px; top: 11px;"
                            :class="!level.id ? 'bg-gray-200' : ''"
                            :style="level.id ? `background: ${getColors(level.status).bottom}` : ''"></div>

                        <button 
                            @click="goToLevel(level.id)"
                            :disabled="!level.id || level.status === 'locked'"
                            :style="level.id ? `background: ${getColors(level.status).top}; border-color: ${getColors(level.status).bottom}` : ''"
                            class="w-20 h-20 rounded-full border-b-7 flex items-center justify-center transition-all"
                            :class="!level.id ? 'bg-gray-300 border-gray-400' : 'active:translate-y-1'">
                            
                             <template x-if="level.status === 'completed'">
                                <svg class="w-10 h-10" :style="`color: ${getColors(level.status).icon}`" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                                </svg>
                            </template>

                            <template x-if="level.status === 'current'">
                                <svg class="w-10 h-10" :style="`color: ${getColors(level.status).icon}`" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                </svg>
                            </template>

                            <template x-if="level.status === 'locked' || level.status === 'next'">
                                <svg class="w-10 h-10" :style="`color: ${getColors(level.status).icon}`" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                                </svg>
                            </template>
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 shadow-2xl flex justify-around items-center z-50">
            <a href="/achievments/" class="p-2"><img src="/public/achiev-icon.svg" class="h-8 w-8"></a>
            <a href="#" class="p-2 bg-purple-200 rounded-full"><img src="/public/book-icon.svg" class="h-8 w-8"></a>
            <a href="/profile/" class="p-2"><img src="/public/robot-icon.svg" class="h-8 w-8"></a>
        </nav>

    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
        function trackApp() {
            return {
                token: localStorage.getItem('token'),
                courseId: null,
                courseTitle: localStorage.getItem('cache_title') || 'Загрузка...',
                levels: JSON.parse(localStorage.getItem('cache_levels') || '[]'),
                visibleLevels: Array.from({ length: 30 }, () => ({ id: null, status: 'locked' })),
                currentLevel: null,
                baseUrl: window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://api.code-lingo.ru',

                async init() {
                    if (!this.token) { window.location.href = '/'; return; }

                    if (this.levels.length > 0) {
                        this.processLevels();
                    }

                    try {
                        // 1. Получаем текущий курс пользователя
                        const res = await fetch(`${this.baseUrl}/api/users/course`, {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        const data = await res.json();

                        if (!data.course_id) {
                            window.location.href = '/courses/';
                            return;
                        }

                        this.courseId = data.course_id;
                        this.courseTitle = data.course_title;

                        // 2. Получаем уровни курса
                        const levelsRes = await fetch(`${this.baseUrl}/api/courses/${this.courseId}/levels`, {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        this.levels = await levelsRes.json();

                        localStorage.setItem('cache_levels', JSON.stringify(this.levels));
                        localStorage.setItem('cache_title', this.courseTitle);

                        this.processLevels();
                    } catch (e) {
                        console.error('Ошибка:', e);
                    }
                },

                processLevels() {
                    // 1. Сортируем исходный массив по возрастанию порядкового номера
                    this.levels.sort((a, b) => a.num_in_order - b.num_in_order);

                    const TOTAL_SLOTS = 30;
                    
                    // 2. Находим индекс первого непройденного уровня в уже отсортированном массиве
                    const currentIndex = this.levels.findIndex(l => !l.is_complete);
                    
                    // Определяем текущий уровень (если всё пройдено, берем последний)
                    this.currentLevel = currentIndex !== -1 
                        ? this.levels[currentIndex] 
                        : this.levels[this.levels.length - 1];

                    this.visibleLevels = Array.from({ length: TOTAL_SLOTS }, (_, i) => {
                        const realLevel = this.levels[i];
                        
                        let status = 'locked';
                        if (realLevel) {
                            if (realLevel.is_complete) {
                                status = 'completed';
                            } else if (i === currentIndex || (currentIndex === -1 && i === this.levels.length - 1)) {
                                status = 'current';
                            } else {
                                status = 'locked';
                            }
                        }

                        return {
                            id: realLevel?.id || null,
                            // Используем num_in_order для заголовка, если самого заголовка нет
                            title: realLevel?.title || `Уровень ${realLevel?.num_in_order || i + 1}`,
                            status: status
                        };
                    });
                },

                getColors(status) {
                    if (status === 'current') return { top: '#E0AAFF', bottom: '#C77DFF', icon: '#A568CC' };
                    if (status === 'completed') return { top: '#FFDE00', bottom: '#FFB100', icon: '#F49000' };
                    return { top: '#E5E5E5', bottom: '#B7B7B7', icon: '#AFAFAF' }; // Locked / Next
                },

                // Логика смещения для эффекта "змейки"
                getOffset(index) {
                    const pattern = [0, 25, 45, 25, 0, -25, -45, -25];
                    return pattern[index % pattern.length];
                },

                goToLevel(id) {
                console.log("id=" + id + "!");
                    if (!id) return;
                    window.location.href = `/lesson/?id=${id}`; 
                }
            }
        }
    </script>
</body>
</html>
