<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/robot.svg" type="image/svg+xml">
    <title>Уровень</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style>
        [x-cloak] { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        .animate-popIn { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }

        /* Анимация только для элементов с этим классом при ошибке */
        .shake-element { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
</head>
<body>
    <div x-data="levelApp()" class="min-h-screen bg-white font-sans text-slate-800 pb-64">
    
    <!-- Header (Progress Bar) -->
    <div class="fixed top-0 inset-x-0 bg-white z-40">
        <div class="max-w-2xl mx-auto px-4 h-16 flex items-center gap-4">
            <button @click="showExitModal = true" class="p-2 hover:bg-slate-100 rounded-full transition">
                <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <div class="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-[#C77DFF] transition-all duration-500" :style="`width: ${progress}%`"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto pt-20 px-6">
        <!-- Theory Step -->
        <template x-if="step === 'theory'">
            <div class="animate-fadeIn bg-white rounded-2xl p-6 shadow-sm">
                <div class="prose prose-purple max-w-none text-gray-800" x-html="renderedContent"></div>
            </div>
        </template>

        <!-- Task Step -->
        <template x-if="step === 'task' && currentTask">
            <div class="animate-fadeIn">
                <h2 class="text-2xl font-bold mb-2" x-text="currentTask.title"></h2>
                <p class="text-slate-500 mb-8 whitespace-pre-line" x-text="currentTask.description"></p>

                <!-- Task Type: Choice -->
                <template x-if="currentTask.task_type === 'choice'">
                    <div class="space-y-3">
                        <template x-for="option in currentTask.options" :key="option.id">
                            <button @click="toggleChoice(option.id)"
                                :disabled="isChecked && !isWrong"
                                :class="{
                                    'border-slate-200': !selectedOptions.includes(option.id),
                                    'border-[#C77DFF] bg-[#F3E8FF]': selectedOptions.includes(option.id) && !isChecked,
                                    'border-red-500 bg-red-50 shake-element': isWrong && selectedOptions.includes(option.id),
                                    'border-green-500 bg-green-50': isChecked && !isWrong && selectedOptions.includes(option.id)
                                }"
                                class="w-full p-4 flex items-center gap-3 border-2 rounded-2xl transition-all text-left">
                                <div :class="{
                                    'bg-[#C77DFF] border-[#C77DFF]': selectedOptions.includes(option.id) && !isChecked,
                                    'bg-red-500 border-red-500': isWrong && selectedOptions.includes(option.id),
                                    'bg-green-500 border-green-500': isChecked && !isWrong && selectedOptions.includes(option.id),
                                    'border-slate-300': !selectedOptions.includes(option.id)
                                }" class="w-6 h-6 mt-0.5 flex-shrink-0 rounded-md border-2 flex items-center justify-center transition-colors">
                                    <svg x-show="selectedOptions.includes(option.id)" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                                </div>
                                <span class="font-medium" x-text="option.text"></span>
                            </button>
                        </template>
                    </div>
                </template>

                <!-- Task Type: Gap -->
                <template x-if="currentTask.task_type === 'gap'">
                    <div class="space-y-4"> <template x-for="(gapRow, rowIdx) in currentTask.gapRows" :key="rowIdx">
                            <div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-100 leading-loose text-lg">
                                <template x-for="part in gapRow.parts">
                                    <span class="inline-flex items-baseline">
                                        <span x-text="part.text"></span>
                                        <template x-if="part.isInput">
                                            <input type="text" 
                                                x-model="gapAnswers[part.globalIndex]"
                                                @input="isWrong = false; isChecked = false"
                                                :class="{
                                                    'border-[#C77DFF] text-[#C77DFF]': !isChecked,
                                                    'border-red-500 text-red-500 shake-element': isWrong,
                                                    'border-green-500 text-green-500': isChecked && !isWrong
                                                }"
                                                class="mx-2 px-2 py-0.5 border-b-2 bg-transparent focus:outline-none min-w-[60px] text-center font-mono transition-colors"
                                                :style="`width: ${(gapAnswers[part.globalIndex]?.length || 2) + 1}ch`"
                                            >
                                        </template>
                                    </span>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Task Type: Code -->
                <template x-if="currentTask.task_type === 'code'">
                    <div class="space-y-4">
                        <div class="bg-[#1E1E1E] rounded-2xl p-4 shadow-xl">
                            <div class="flex items-center gap-2 mb-3 px-1">
                                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                                <span class="text-slate-500 text-xs ml-2 font-mono" x-text="currentTask.code[0].language"></span>
                            </div>
                            <textarea x-model="codeAnswer" class="w-full h-64 bg-transparent text-slate-200 font-mono focus:outline-none resize-none" spellcheck="false"></textarea>
                        </div>

                        <div 
                            x-show="isWrong && codeError" 
                            x-transition
                            class="bg-red-50 border-2 border-red-100 rounded-2xl p-4 animate-fadeIn"
                        >
                            <div class="flex items-center gap-2 mb-2 text-red-600 font-bold">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <span class="text-sm uppercase tracking-wide">Ошибка выполнения:</span>
                            </div>
                            <pre 
                                class="text-xs md:text-sm font-mono text-red-800 overflow-x-auto whitespace-pre-wrap leading-relaxed" 
                                x-text="codeError"
                            ></pre>
                        </div>

                        <div 
                            x-show="isWrong && failedTest" 
                            x-transition
                            class="bg-orange-50 border-2 border-orange-100 rounded-2xl overflow-hidden animate-fadeIn"
                        >
                            <div class="bg-orange-100 px-4 py-2 flex items-center gap-2 text-orange-700 font-bold text-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                ТЕСТ НЕ ПРОЙДЕН
                            </div>
                            
                            <div class="p-4 space-y-4">
                                <div x-show="failedTest?.input && failedTest.input !== ''">
                                    <div class="text-xs text-slate-400 uppercase font-bold mb-1">Ввод:</div>
                                    <pre class="bg-white/50 p-2 rounded border border-orange-100 font-mono text-sm" x-text="failedTest.input"></pre>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <div class="text-xs text-slate-400 uppercase font-bold mb-1">Ожидалось:</div>
                                        <pre class="bg-green-50/50 p-2 rounded border border-green-100 font-mono text-sm text-green-700 whitespace-pre-wrap" x-text="failedTest?.expected"></pre>
                                    </div>
                                    <div>
                                        <div class="text-xs text-slate-400 uppercase font-bold mb-1">Ваш вывод:</div>
                                        <pre class="bg-red-50/50 p-2 rounded border border-red-100 font-mono text-sm text-red-700 whitespace-pre-wrap" x-text="failedTest?.got"></pre>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </template>
            </div>
        </template>

        <!-- Final Results Step -->
        <template x-if="step === 'complete'">
            <div class="flex flex-col items-center justify-center min-h-[70vh] text-center animate-fadeIn">
                <div class="relative mb-8 animate-float">
                    <img src="/public/cat.svg" alt="Mascot" class="w-48 h-48 mx-auto">
                </div>
                <h1 class="text-4xl font-black text-[#C77DFF] mb-8 uppercase tracking-tight animate-popIn">Урок пройден!</h1>
                <div class="animate-popIn delay-100">
                    <div class="inline-block bg-white border-2 border-[#C77DFF] rounded-3xl overflow-hidden shadow-lg">
                        <div class="bg-[#C77DFF] text-white text-xs font-bold py-1 px-8 uppercase tracking-widest">XP</div>
                        <div class="py-4 px-10 flex items-center justify-center gap-2">
                            <svg class="w-6 h-6 text-yellow-400 fill-current" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                            <span class="text-3xl font-black text-slate-700" x-text="results.xp_added"></span>
                        </div>
                    </div>
                </div>
                <p class="mt-6 text-slate-400 font-medium animate-fadeIn delay-200">
                    Ваш ударный режим: <span class="text-orange-500 font-bold" x-text="results.streak"></span> дн.
                </p>
            </div>
        </template>
    </main>

    <!-- Footer Action Bar -->
    <div class="fixed bottom-0 inset-x-0 p-6 bg-white border-t border-slate-100 z-40">
        <div class="max-w-2xl mx-auto">
            <template x-if="step === 'complete'">
                <button @click="window.location.href='/track/'" class="w-full py-4 bg-[#C77DFF] hover:bg-[#B366FF] text-white font-bold rounded-2xl shadow-[0_4px_0_0_#AA55FF] active:translate-y-1 active:shadow-none transition-all uppercase tracking-wider">Отлично!</button>
            </template>
            <template x-if="step !== 'complete'">
                <button @click="handleMainAction()" :disabled="isLoading"
                    :class="{ 
                        'bg-[#F35D61] shadow-[0_4px_0_0_#D1484C] shake-element': isWrong,
                        'bg-[#C77DFF] shadow-[0_4px_0_0_#AA55FF]': !isWrong
                    }"
                    class="w-full py-4 disabled:opacity-50 text-white font-bold rounded-2xl active:translate-y-1 active:shadow-none transition-all uppercase tracking-wider"
                    x-text="isWrong ? 'Попробовать снова' : (step === 'theory' ? 'Далее' : (isLastTask ? 'Завершить' : 'Проверить'))">
                </button>
            </template>
        </div>
    </div>

    <!-- Achievement Modal -->
    <div x-show="showAchievementsModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-purple-900/40 backdrop-blur-md" x-cloak x-transition>
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full text-center shadow-2xl animate-popIn border-4 border-[#C77DFF]/20">
            <div class="mb-4 inline-flex items-center justify-center w-20 h-20 bg-yellow-100 rounded-full text-yellow-500">
                <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            </div>
            
            <h2 class="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tight">Новое достижение!</h2>
            <p class="text-slate-500 mb-8 font-medium">Вы только что получили новые награды за свои успехи!</p>

            <div class="space-y-4 mb-8 max-h-60 overflow-y-auto px-2">
                <template x-for="ach in newAchievements" :key="ach.id">
                    <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 animate-fadeIn">
                        <div class="w-16 h-16 flex-shrink-0 bg-white rounded-xl shadow-sm p-2">
                            <img :src="ach.icon" class="w-full h-full object-contain">
                        </div>
                        <div class="text-left">
                            <h4 class="font-bold text-slate-800 text-lg" x-text="ach.title"></h4>
                            <p class="text-xs text-[#C77DFF] font-bold uppercase tracking-widest">Разблокировано</p>
                        </div>
                    </div>
                </template>
            </div>

            <button @click="showAchievementsModal = false" class="w-full py-4 bg-[#C77DFF] text-white font-bold rounded-2xl shadow-[0_4px_0_0_#AA55FF] hover:bg-[#B366FF] transition-all uppercase tracking-wider">
                Продолжить
            </button>
        </div>
    </div>

    <!-- Exit Confirmation Modal -->
    <div x-show="showExitModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl animate-popIn">
            <h3 class="text-2xl font-bold mb-2">Уже уходишь?</h3>
            <p class="text-slate-500 mb-8">Весь прогресс в этом уроке будет потерян.</p>
            <div class="space-y-3">
                <button @click="window.location.href='/track/'" class="w-full py-4 bg-red-500 text-white font-bold rounded-2xl shadow-[0_4px_0_0_#DC2626]">Выйти</button>
                <button @click="showExitModal = false" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">Остаться</button>
            </div>
        </div>
    </div>
</div>

<script>
function levelApp() {
    return {
        token: localStorage.getItem('token'),
        baseUrl: window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://api.code-lingo.ru',
        levelId: new URLSearchParams(window.location.search).get('id')?.replace(/\//g, '').trim(),
        
        step: 'theory',
        tasks: [],
        currentTaskIndex: 0,
        renderedContent: '',
        isLoading: false,
        isWrong: false,
        progress: 5,
        showExitModal: false,
        
        // Achievement states
        newAchievements: [],
        showAchievementsModal: false,

        results: { xp_added: 0, streak: 0 },
        selectedOptions: [], 
        gapAnswers: [],      
        codeAnswer: '',
        codeError: '',
        failedTest: null,
        isChecked: false,

        async init() {
            if (!this.token || !this.levelId) { window.location.href = '/track/'; return; }
            await Promise.all([this.loadTheory(), this.loadTasks()]);
        },

        async apiFetch(endpoint, options = {}) {
            return fetch(`${this.baseUrl}${endpoint}`, {
                ...options,
                headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json', ...options.headers }
            });
        },

        async loadTheory() {
            try {
                const res = await this.apiFetch(`/api/levels/${this.levelId}/theory`);
                const data = await res.json();
                this.renderedContent = marked.parse(data.theory || '');
            } catch (e) { console.error(e); }
        },

        async loadTasks() {
            try {
                const res = await this.apiFetch(`/api/levels/${this.levelId}/tasks`);
                const data = await res.json();
                this.tasks = data.sort((a, b) => a.num_in_order - b.num_in_order);
                this.prepareCurrentTask();
            } catch (e) { console.error(e); }
        },

        get currentTask() { return this.tasks[this.currentTaskIndex] || null; },
        get isLastTask() { return this.tasks.length > 0 && this.currentTaskIndex === this.tasks.length - 1; },

        prepareCurrentTask() {
            if (!this.currentTask) return;
            this.isWrong = false;
            this.isChecked = false;
            this.selectedOptions = [];
            this.gapAnswers = [];
            this.codeAnswer = '';
            this.codeError = '';
            this.failedTest = null;

            if (this.currentTask.task_type === 'gap' && this.currentTask.gaps) {
                let globalInputIdx = 0;

                this.currentTask.gapRows = this.currentTask.gaps.map(gapObj => {
                    const parts = gapObj.template.split(/(%g%)/g);
                    return {
                        parts: parts.map(p => {
                            if (p === '%g%') {
                                return { isInput: true, globalIndex: globalInputIdx++ };
                            }
                            return { isInput: false, text: p };
                        })
                    };
                });

                this.gapAnswers = new Array(globalInputIdx).fill('');
            }
            if (this.currentTask.task_type === 'code' && this.currentTask.code?.[0]) {
                this.codeAnswer = this.currentTask.code[0].template;
            }
            this.updateProgress();
        },

        updateProgress() {
            const total = this.tasks.length + 1;
            const current = this.step === 'theory' ? 1 : this.currentTaskIndex + 2;
            this.progress = Math.min((current / total) * 100, 100);
        },

        toggleChoice(id) {
            this.isWrong = false;
            this.selectedOptions.includes(id) ? this.selectedOptions = this.selectedOptions.filter(i => i !== id) : this.selectedOptions.push(id);
        },

        async handleMainAction() {
            if (this.step === 'theory') {
                if (this.tasks.length === 0) { window.location.href = '/track/'; return; }
                this.step = 'task'; this.prepareCurrentTask(); return;
            }
            await this.submitTask();
        },

        async submitTask() {
            if (this.isLoading) return;

            if (this.isWrong) {
                this.isWrong = false;
                this.isChecked = false;
                return;
            }    

            this.isLoading = true;
            let answers = this.currentTask.task_type === 'choice' ? this.selectedOptions : (this.currentTask.task_type === 'gap' ? this.gapAnswers : this.codeAnswer);

            try {
                const res = await this.apiFetch(`/api/tasks/${this.currentTask.id}/submit`, {
                    method: 'POST', body: JSON.stringify({ answers })
                });
                const result = await res.json();
                
                if (result.is_correct) {
                    this.codeError = '';
                    this.failedTest = null;

                    setTimeout(async () => {
                        if (this.isLastTask) await this.completeLevel();
                        else { this.currentTaskIndex++; this.prepareCurrentTask(); }
                    }, 600);    
                } else {
                    this.isWrong = true;
                    this.shouldShake = true;

                    this.codeError = result.traceback || 'Execution error';
                    this.failedTest = result.failed_test || null;

                    setTimeout(() => { this.shouldShake = false; }, 500);
                }
            } catch (e) { alert('Ошибка сервера'); }
            finally { this.isLoading = false; }
        },

        async completeLevel() {
            try {
                const res = await this.apiFetch(`/api/levels/${this.levelId}/complete`, { method: 'POST' });
                if (res.ok) {
                    const data = await res.json();
                    this.results = data;
                    
                    // Логика достижений
                    if (data.new_achievments && data.new_achievments.length > 0) {
                        this.newAchievements = data.new_achievments;
                        this.showAchievementsModal = true;
                    }

                    this.step = 'complete';
                    this.progress = 100;
                }
            } catch (e) { console.error(e); }
        }
    }
}
</script>
</body>
</html>
