<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="authHandler()" class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased text-gray-700">

    <div class="w-full max-w-sm p-6 text-center">
        <div class="flex justify-center mb-8">
            <img src="/robot.svg" alt="Robot" class="h-32 w-auto">
        </div>
        
        <h1 class="text-2xl font-bold mb-10 uppercase tracking-widest text-slate-800">Добро пожаловать</h1>

        <div class="space-y-4">
            <a href="/auth/?mode=login" 
               class="block w-full bg-[#c084fc] hover:bg-[#b060ff] text-white font-bold py-4 rounded-2xl shadow-lg shadow-purple-200 transition-all transform active:scale-[0.98] text-center uppercase tracking-widest">
                Войти
            </a> 

            <a href="/auth/?mode=register" 
               class="block w-full bg-white border-2 border-[#c084fc] text-[#c084fc] hover:bg-purple-50 font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98] text-center uppercase tracking-widest">
                Регистрация
            </a>

            <div class="relative py-4 flex items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-widest">или</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button @click="loginWithGoogle()"
               class="flex items-center justify-center w-full bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-semibold py-4 rounded-2xl shadow-sm transition-all transform active:scale-[0.98] tracking-wide">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="h-5 w-5 mr-3">
                Войти через Google
            </button>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        function authHandler() {
            return {
                init() {
                    // 1. Проверяем, нет ли токена в URL (после редиректа с бэкенда)
                    const urlParams = new URLSearchParams(window.location.search);
                    const token = urlParams.get('access_token');

                    if (token) {
                        // Сохраняем токен и убираем его из URL для чистоты
                        localStorage.setItem('token', token);
                        window.location.href = '/profile/'; 
                    }
                },
                loginWithGoogle() {
                    // 2. Отправляем на бэк с указанием платформы
                    // Замени URL на свой реальный адрес бэкенда
                    const backendUrl = 'https://api.code-lingo.ru/api/auth/google/login';
                    window.location.href = `${backendUrl}?platform=web`;
                }
            }
        }
    </script>
</body>
</html>
