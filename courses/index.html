<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор курса</title>
    <style>
        [x-cloak] { display: none !important; }
        @keyframes pulse { 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-white min-h-screen font-sans antialiased text-gray-800">

    <div x-data="courseApp()" class="min-h-screen bg-gray-50 flex flex-col items-center">
        
        <header class="w-full bg-white border-b border-gray-100 p-4 mb-6">
            <div class="max-w-2xl mx-auto flex items-center justify-between">
                <button @click="window.location.href = '/'" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <h1 class="text-xl font-bold uppercase tracking-wider">Курсы</h1>
                <div class="w-8"></div> </div>
        </header>

        <main class="w-full max-w-2xl px-6 space-y-4 mb-24">
            <template x-for="course in courses" :key="course.id">
                <div 
                    @click="selectedId = course.id"
                    :class="selectedId === course.id ? 'border-[#c084fc] bg-purple-50/30 ring-2 ring-purple-100 shadow-md' : 'border-gray-200 bg-white'"
                    class="relative border-2 rounded-[2rem] p-6 transition-all cursor-pointer hover:border-purple-200 flex gap-6 items-center group"
                >
                    <div class="flex-1">
                        <h2 class="text-xl font-bold mb-1 group-hover:text-[#c084fc] transition-colors" x-text="course.title"></h2>
                        <p class="text-sm text-gray-500 leading-relaxed line-clamp-2" x-text="course.description"></p>
                    </div>
                    
                    <div class="w-20 h-20 shrink-0 flex items-center justify-center overflow-hidden p-2">
                        <img :src="course.course_icon ? course.course_icon : '/public/course-icon.svg'" 
                            :alt="course.title" 
                            class="w-full h-auto transform group-hover:scale-110 transition-transform">
                    </div>
                </div>
            </template>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-center">
            <div class="w-full max-w-2xl">
                <button 
                    @click="startCourse()"
                    :disabled="!selectedId || isStarting"
                    :class="!selectedId ? 'opacity-50 grayscale cursor-not-allowed' : 'hover:bg-[#b060ff] active:scale-[0.98] shadow-lg shadow-purple-200'"
                    class="w-full bg-[#c084fc] text-white font-bold py-4 rounded-2xl transition-all uppercase tracking-widest text-lg"
                >
                    <span x-show="!isStarting">Начать</span>
                    <span x-show="isStarting">Загрузка...</span>
                </button>
            </div>
        </footer>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        function courseApp() {
            return {
                courses: [],
                selectedId: null,
                isLoading: true,
                isStarting: false,
                token: localStorage.getItem('token'),
                baseUrl: window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://api.code-lingo.ru',

                async init() {
                    if (!this.token) {
                        window.location.href = '/auth/';
                        return;
                    }

                    try {
                        // 2. Если курса нет (null), загружаем список доступных
                        const coursesRes = await fetch(`${this.baseUrl}/api/courses/`);
                        this.courses = await coursesRes.json();

                    } catch (err) {
                        console.error('Ошибка загрузки:', err);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async startCourse() {
                    if (!this.selectedId) return;
                    this.isStarting = true;

                    try {
                        // Здесь можно отправить запрос на бэк о начале курса, если это нужно
                        const response = await fetch(`${this.baseUrl}/api/courses/${this.selectedId}/start/`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            throw new Error(data.detail || 'Произошла ошибка');
                        }

                        console.log('Курс начат:', data);
                        window.location.href = '/track/'; // Переход к обучению
                    } catch (err) {
                        alert('Не удалось начать курс');
                    } finally {
                        this.isStarting = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
